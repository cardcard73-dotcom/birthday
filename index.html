<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #ffe4ec;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 20px;
  color: #ff4d88;
}

p {
  color: #444;
}

/* รูป */
.slider {
  width: 220px;
  height: 220px;
  margin: 20px;
  position: relative;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  position: absolute;
  opacity: 0;
  transition: 1s;
}

.slider img.active {
  opacity: 1;
}

/* ปุ่ม */
button {
  padding: 10px 18px;
  background: #ff4d88;
  color: white;
  border: none;
  border-radius: 20px;
}

/* popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-box {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 100px auto;
  width: 80%;
  max-width: 300px;
}

/* หัวใจ */
.heart {
  position: fixed;
  bottom: -10px;
  animation: float 5s linear infinite;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-100vh);}
}
</style>
</head>

<body onclick="startMusic()">

<h1>Happy Birthday 🎂💖</h1>
<p>ถึง คุณฐิติพรรณ 💕</p>

<div class="slider">
  <img src="photo1.jpg" class="active">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<p>
ขอให้ทุกวันในปีนี้สุขภาพร่างกายแข็งแรง<br>
ไม่เจ็บไม่ป่วย สุขทั้งกายและใจ 💖<br>
ประสบความสำเร็จในทุกปรารถนา 🎉
</p>

<button onclick="showPopup()">กดตรงนี้ 💘</button>

<!-- เพลง -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>รักเธอนะ 💖</h2>
    <p>หวังว่าปีหน้าจะยังมีกัน</p>
    <p><b>จาก ปรินทร์แฟนของคุณ 💕</b></p>
    <button onclick="closePopup()">ปิด</button>
  </div>
</div>

<script>
function showPopup() {
  event.stopPropagation();
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// เพลง
let played = false;
function startMusic() {
  if (!played) {
    document.getElementById("music").play();
    played = true;
  }
}

// สไลด์
let i = 0;
let img = document.querySelectorAll(".slider img");

setInterval(() => {
  img[i].classList.remove("active");
  i = (i + 1) % img.length;
  img[i].classList.add("active");
}, 2000);

// หัวใจ
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}, 500);
</script>

</body>
  </html>
